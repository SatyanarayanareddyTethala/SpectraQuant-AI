data_retention:
  enforce_on_download: true
  enforce_on_train_complete: true
  initial_years_for_training: 10
  post_training_years_to_keep: 5
execution:
  mode: eod
  slippage_bps: 5
  transaction_cost_bps: 1
  volume_participation: 0.1
experts:
  enabled: false
  list:
  - trend
  - momentum
  - mean_reversion
  - volatility
  - value
  - news_catalyst
  min_coverage: 5
  output_dir: reports/experts
explain:
  enabled: false
filesystem:
  ignore_synthetic_folders: true
intelligence:
  alert_channels:
    email: false
  cooldown_minutes: 60
  daily_loss_limit: 5000.0
  embedding_model: hashing
  enabled: true
  executor_enabled: true
  exposure_caps:
    gross: 1.5
    name: 0.1
    sector: 0.3
  max_memory_items: 10000
  max_positions: 10
  max_sector_exposure: 0.3
  meta_update_freq: 7
  planner_enabled: true
  portfolio_enabled: true
  regime_window_days: 20
  storage_dir: data/state
  thresholds:
    alpha: 0.0
    buy: 0.55
    sell: 0.45
intraday:
  enabled: true
  fallback_intervals:
  - 15m
  - 30m
  - 60m
  interval: 5m
  lookback_days: 30
  off_hours_refresh_seconds: 1800
  only_run_during_market_hours: true
  refresh_seconds: 300
  retention_days: 7
  signal_thresholds:
    buy: 0.55
    sell: 0.45
  tickers: []
  top_n: 5
meta_policy:
  decay: 0.97
  enabled: false
  lookback_days: 90
  method: perf_weighted
  min_trades_for_trust: 20
  regime:
    high_vol_threshold: 0.25
    index_ticker: ^NSEI
    trend_fast: 20
    trend_slow: 50
    vol_lookback: 20
  risk_guardrails:
    disable_on_drawdown: 0.15
    max_turnover: null
    min_calibration: 0.55
  weight_cap: 0.6
  weight_floor: 0.05
mlops:
  auto_retrain: true
  drift_recent_fraction: 0.1
  drift_threshold: 0.6
  min_improvement: 0.01
  retrain_interval_days: 7
  seed: 42
  walk_forward_splits: 3
news_ai:
  enabled: true
  lookback_hours: 24
  output_dir: reports/news
  recency_half_life_hours: 6
  source_rank_min: 0.3
news_universe:
  aliases_path: data/universe/company_aliases.csv
  cache_dir: data/news_cache
  confirmation:
    gap_abs_return_threshold: 0.015
    lookback_days: 20
    method: gap_or_volume
    volume_z_threshold: 1.5
  enabled: true
  lookback_hours: 24
  max_candidates: 50
  min_liquidity_avg_volume: 500000
  min_source_rank: 0.5
  persist_articles_json: true
  recency_decay_half_life_hours: 6
  require_price_confirmation: true
  sentiment_model: vader
  source_weights_path: data/news/source_weights.csv
onchain_ai:
  anomaly_threshold: 2.5
  enabled: true
  output_dir: reports/onchain
  refresh_minutes: 15
perf:
  max_mb: 51200
  max_seconds: 60000
  stage_budgets_seconds:
    refresh: 60000
  stages:
    download:
      max_seconds: 180000
portfolio:
  allocation_mode: multi
  alpha_threshold: -1000000000.0
  horizon: 5d
  liquidity_min_volume: null
  live_single_step: false
  max_asset_weight: null
  max_positions: 10
  max_turnover: null
  max_weight: null
  min_weight_threshold: 0.0
  policies: {}
  policy:
    auto_repair: false
  rebalance: monthly
  sector_limits: {}
  sector_map: {}
  top_k: 20
  volatility_target: null
  weighting: equal
predictions:
  daily_horizons:
  - 1d
  - 5d
  - 20d
  intraday_horizons:
  - 5m
  - 30m
  - 60m
qa:
  flatline_window: 5
  force_pass_tests: false
  max_abs_daily_return: 0.8
  max_missing_pct: 0.2
  min_eligible_tickers: 10
  min_expected_return_std_daily: 1.0e-06
  min_expected_return_std_intraday: 1.0e-09
  min_price_rows: 30
  min_volume: 0
  mode: lenient
  price_return_source: auto
  split_like_enabled: true
  split_like_factors:
  - 2
  - 3
  - 4
  - 5
  - 10
  - 20
  split_like_tolerance: 0.03
  stale_tolerance_minutes: 30
research_mode: false
sentiment:
  enabled: true
  lookback_days: 30
  max_articles_per_ticker: 50
  newsapi_max_lookback_days: 30
  provider: newsapi
  refresh_cache: true
  social:
    provider: stocktwits
  use_news: true
  use_social: true
test_mode:
  enabled: false
  limit_tickers: 2
universe:
  dry_run: true
  india:
    filter_series_eq: false
    source: csv
    suffix: .NS
    symbol_column: symbol
    tickers_file: data/universe/universe_nse.csv
    tickerset: null
  path: data/universe/universe_nse.csv
  selected_sets:
  - india
  tickers: *id001
  uk:
    source: lse
    tickers_file: data/universe/lse_all.csv
    tickerset: null
