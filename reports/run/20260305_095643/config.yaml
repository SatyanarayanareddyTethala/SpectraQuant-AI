agents:
  enabled: true
  list:
  - momentum
  - mean_reversion
  - volatility
  - carry_funding
  - news_catalyst
  - onchain_flow
  output_dir: reports/agents
alpha:
  enabled: true
  weights:
    momentum: 0.35
    trend: 0.25
    value: 0.2
    volatility: 0.2
crypto:
  candle_intervals:
  - 1m
  - 5m
  enabled: true
  endpoint: ws-feed
  environment: production
  news_first: true
  news_max_symbols: 10
  news_strict: false
  prices_dir: data/prices/crypto
  symbols:
  - BTC-USD
  - ETH-USD
  - SOL-USD
  timeframe: 1m
  universe_csv: src/spectraquant/crypto/universe/crypto_universe.csv
crypto_meta_policy:
  decay: 0.95
  enabled: true
  perf_lookback_days: 30
  weight_cap: 0.5
  weight_floor: 0.05
  weighting: regime_perf
crypto_portfolio:
  allocator: vol_target
  max_turnover: 0.3
  max_weight: 0.25
  rebalance_frequency: daily
  stop_trading_drawdown: 0.1
  target_vol: 0.15
data:
  batch_size: 50
  batch_sleep_seconds: 3
  cooldown_seconds: 0
  daily_retention_years: 5
  force_download: false
  max_retries: 5
  max_tickers_per_run: 2000
