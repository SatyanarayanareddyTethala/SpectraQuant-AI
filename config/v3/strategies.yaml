# SpectraQuant-AI-V3 — Strategy Definitions
# Declarative strategy registry configuration.
# Strategies are loaded by StrategyRegistry at startup.

strategies:

  crypto_momentum_v1:
    asset_class: crypto
    description: Crypto momentum strategy using RSI + momentum signals
    universe_mode: dynamic_topN
    top_n: 20
    feature_engine: crypto_features_v1
    agents:
      - momentum_agent_v1
    policy: confidence_filter_v1
    allocator: equal_weight_v1
    rebalance_frequency: D
    risk_limits:
      max_weight: 0.20
      max_gross_leverage: 1.0
    feature_version: "1.0.0"
    enabled: true

  crypto_momentum_v2:
    asset_class: crypto
    description: Crypto momentum with volatility targeting
    universe_mode: dynamic_topN
    top_n: 15
    feature_engine: crypto_features_v1
    agents:
      - momentum_agent_v1
    policy: confidence_filter_v1
    allocator: vol_target_v1
    rebalance_frequency: W
    risk_limits:
      max_weight: 0.25
      max_gross_leverage: 1.0
      target_vol: 0.15
    feature_version: "1.0.0"
    enabled: true

  crypto_momentum_news_hybrid_v1:
    asset_class: crypto
    description: Crypto momentum blended with 24h news sentiment and shock uplift
    universe_mode: dynamic_topN
    top_n: 20
    feature_engine: crypto_features_v1
    agents:
      - crypto_momentum_news_hybrid_v1
    policy: confidence_filter_v1
    allocator: vol_target_v1
    rebalance_frequency: D
    signal_blend:
      momentum_weight: 0.7
      news_weight: 0.3
    shock_uplift:
      threshold: 2.0
      max_uplift: 0.15
    risk_limits:
      max_weight: 0.20
      max_gross_leverage: 1.0
      target_vol: 0.15
    feature_version: "2.0.0"
    enabled: true

  equity_momentum_v1:
    asset_class: equity
    description: Equity momentum strategy
    universe_mode: static
    feature_engine: equity_features_v1
    agents:
      - momentum_agent_v1
    policy: confidence_filter_v1
    allocator: equal_weight_v1
    rebalance_frequency: W
    risk_limits:
      max_weight: 0.10
      max_gross_leverage: 1.0
    feature_version: "1.0.0"
    enabled: true

# ---------------------------------------------------------------------------
# Strategy portfolio definitions
# ---------------------------------------------------------------------------
strategy_portfolios:

  multi_alpha_v1:
    description: Combined crypto + equity momentum portfolio
    strategy_ids:
      - crypto_momentum_v1
      - equity_momentum_v1
    weighting_scheme: equal
    rebalance_frequency: M
    max_strategy_weight: 0.7
    enabled: true
